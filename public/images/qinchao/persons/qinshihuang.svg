      <stop offset="0%" stop-color="#1c0e00"/>
      <stop offset="100%" stop-color="#0d0800"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="200" height="260" fill="url(#bg)"/>
  <rect width="200" height="140" fill="url(#glow)"/>
  <rect x="6" y="6" width="188" height="248" fill="none" stroke="#b45309" stroke-width="2" rx="2" opacity="0.9"/>
