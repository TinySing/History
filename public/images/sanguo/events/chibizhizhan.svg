<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0500"/>
      <stop offset="60%" stop-color="#0d0200"/>
      <stop offset="100%" stop-color="#001020"/>
    </linearGradient>
    <linearGradient id="fire1" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="50%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fire2" x1="50%" y1="100%" x2="50%" y2="0%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="60%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#fef08a" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#082f49"/>
    </linearGradient>
  </defs>
  <rect width="300" height="200" fill="url(#bg)"/>
  <!-- Water -->
  <ellipse cx="150" cy="175" rx="160" ry="35" fill="url(#water)" opacity="0.7"/>
  <path d="M0,165 Q50,155 100,165 Q150,175 200,165 Q250,155 300,165 L300,200 L0,200 Z" fill="#082f49" opacity="0.9"/>
  <!-- Wave lines -->
  <path d="M20,170 Q50,163 80,170 Q110,177 140,170" fill="none" stroke="#0369a1" stroke-width="1" opacity="0.5"/>
  <path d="M160,172 Q190,165 220,172 Q250,179 280,172" fill="none" stroke="#0369a1" stroke-width="1" opacity="0.5"/>
  <!-- Flame shapes -->
  <ellipse cx="80" cy="130" rx="25" ry="50" fill="url(#fire1)" opacity="0.85"/>
  <ellipse cx="110" cy="120" rx="20" ry="60" fill="url(#fire2)" opacity="0.8"/>
  <ellipse cx="55" cy="140" rx="18" ry="40" fill="url(#fire1)" opacity="0.7"/>
  <ellipse cx="200" cy="125" rx="22" ry="55" fill="url(#fire1)" opacity="0.85"/>
  <ellipse cx="228" cy="135" rx="18" ry="45" fill="url(#fire2)" opacity="0.75"/>
  <ellipse cx="175" cy="140" rx="16" ry="38" fill="url(#fire1)" opacity="0.7"/>
  <!-- Ships silhouettes -->
  <path d="M60,162 Q80,152 100,162 L100,170 L60,170 Z" fill="#1c0300" opacity="0.9"/>
  <path d="M185,158 Q210,148 230,158 L230,168 L185,168 Z" fill="#1c0300" opacity="0.9"/>
  <!-- Frame -->
  <rect x="5" y="5" width="290" height="190" fill="none" stroke="#b45309" stroke-width="1.5" rx="2" opacity="0.7"/>
  <path d="M5,25 L5,5 L25,5" fill="none" stroke="#f97316" stroke-width="2"/>
  <path d="M275,5 L295,5 L295,25" fill="none" stroke="#f97316" stroke-width="2"/>
  <path d="M5,175 L5,195 L25,195" fill="none" stroke="#f97316" stroke-width="2"/>
  <path d="M275,195 L295,195 L295,175" fill="none" stroke="#f97316" stroke-width="2"/>
  <!-- Title -->
  <rect x="80" y="12" width="140" height="28" fill="#7c1d1d" opacity="0.7" rx="2"/>
  <text x="150" y="31" text-anchor="middle" font-size="17" fill="#fef3c7" font-family="'Noto Serif SC', serif" letter-spacing="3" font-weight="bold">赤壁之战</text>
  <!-- Year -->
  <text x="150" y="188" text-anchor="middle" font-size="11" fill="#fb923c" font-family="serif" letter-spacing="1" opacity="0.8">公元208年 · 火烧赤壁</text>
</svg>
