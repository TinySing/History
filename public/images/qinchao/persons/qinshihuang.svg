  <rect x="16" y="16" width="168" height="228" fill="none" stroke="#92400e" stroke-width="0.4" rx="1" opacity="0.4"/>
  <!-- Thicker corner ornaments for emperor -->
  <path d="M6,35 L6,6 L35,6" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <path d="M165,6 L194,6 L194,35" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <path d="M6,225 L6,254 L35,254" fill="none" stroke="#f59e0b" stroke-width="3"/>
  <path d="M165,254 L194,254 L194,225" fill="none" stroke="#f59e0b" stroke-width="3"/>
