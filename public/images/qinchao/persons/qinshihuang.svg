  <text x="100" y="135" text-anchor="middle" font-size="56" fill="#f59e0b" font-family="'Noto Serif SC', Georgia, serif" font-weight="900" opacity="0.95" letter-spacing="2">秦始皇</text>
  <line x1="25" y1="218" x2="175" y2="218" stroke="#d97706" stroke-width="1" opacity="0.6"/>
  <circle cx="60" cy="218" r="3" fill="#f59e0b" opacity="0.7"/>
