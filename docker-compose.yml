version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: history_db
    environment:
      POSTGRES_DB: history
      POSTGRES_USER: history
      POSTGRES_PASSWORD: history
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U history -d history"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        NEXT_PUBLIC_BASEPATH: /history
    container_name: history_app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://history:history@db:5432/history
      NODE_ENV: production
      NEXT_PUBLIC_BASEPATH: /history
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
